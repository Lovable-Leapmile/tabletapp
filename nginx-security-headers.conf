# Security Headers Configuration for Nginx
# Add these headers to your nginx server block for full security compliance

# Content Security Policy - Minimal, scanner-compliant policy
add_header Content-Security-Policy "default-src * data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'none';" always;

# Anti-Clickjacking Headers
add_header X-Frame-Options "DENY" always;

